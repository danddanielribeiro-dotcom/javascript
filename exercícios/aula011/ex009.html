<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Países</title>
</head>
<body>
    <h1>Países</h1>
    O país que você está é o <input type="text" name="txtpais" id="txtpais">
    <input type="button" value="verificar" onclick="verificar()">
    <div id="res">

    </div>
    <script>
        function verificar () {
            var txtp = document.getElementById("txtpais")
            var res = document.querySelector("div#res")
            var pais = String(txtp.value)
            res.innerHTML = `você está em <strong>${txtp.value}</strong>`
            if (pais.toLowerCase() == 'brasil') {
                res.innerHTML += `<p>Você é <strong>brasileiro</strong>!</p>`
            }else {
                res.innerHTML += `<p>Você é <strong>estrangeiro</strong>!</p>`
            }             
        }
    </script>
</body>
</html>
