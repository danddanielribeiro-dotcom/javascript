<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        div#area {
            font: normal 20px Arial, sans-serif;
            background-color: rgb(35, 190, 35);
            color: white;
            width: 200px;
            height: 200px;
            line-height: 200px;
            text-align: center;
        }
    </style> 
    <title>Eventos DOM</title>
</head>
<body>
    <div id="area" >
        Passe o mouse aqui!
    </div> 
    <script>
        var a = window.document.getElementById('area');
        a.addEventListener('click', Clicar);
        a.addEventListener('mouseenter', entrar);  
        a.addEventListener('mouseout', sair);
        function Clicar() {
            a.innerText = 'Clicou!';
            a.style.backgroundColor = 'red';
        }
        function entrar() {
            a.innerText = 'Entrou!';
        }
        function sair() {
            a.innerText = 'Saiu!';
            a.style.backgroundColor = 'rgb(35, 190, 35)';
        }   
    </script>
</body>
</html>
